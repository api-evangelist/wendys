description: >-
  The Wendy's Company is a leading international quick-service restaurant chain
  operating over 7,000 restaurants worldwide. Wendy's operates digital commerce
  channels including the Wendy's mobile app, online ordering, and a loyalty
  rewards program. The company uses AI-powered drive-thru ordering (FreshAI)
  powered by Google Cloud, and integrates with third-party delivery platforms
  including DoorDash, Grubhub, and Uber Eats. Wendy's uses PAR Technology for
  loyalty program advancement and NCR Aloha for POS systems. No public
  developer API is available; digital ordering is powered through internal
  platforms and third-party integrations.
